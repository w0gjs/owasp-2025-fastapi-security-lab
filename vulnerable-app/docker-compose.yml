services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: web
      POSTGRES_USER: web
      POSTGRES_PASSWORD: web
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web -d web"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
