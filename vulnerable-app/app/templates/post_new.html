{% extends "base.html" %}
{% block title %}새 글 작성 · 모아{% endblock %}
{% block content %}
<div class="narrow-layout">
    <div class="page-heading">
        <a class="back-link" href="/posts">← 게시판으로</a>
        <h1>새 글 작성</h1>
        <p>함께 나누고 싶은 이야기를 자유롭게 적어주세요.</p>
    </div>
    <section class="panel form-panel">
        <form method="post" action="/posts/new">
            <div class="field">
                <label for="title">제목</label>
                <input id="title" type="text" name="title" maxlength="200" placeholder="제목을 입력하세요" required>
            </div>
            <div class="field">
                <label for="content">내용</label>
                <textarea id="content" name="content" rows="12" placeholder="내용을 입력하세요" required></textarea>
            </div>
            <label class="privacy-option">
                <input type="checkbox" name="is_private" value="true">
                <span>
                    <strong>나만 보기</strong>
                    <small>내 게시글에서만 확인할 수 있습니다.</small>
                </span>
            </label>
            <div class="form-actions">
                <a class="button button-ghost" href="/posts">취소</a>
                <button class="button" type="submit">게시하기</button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
