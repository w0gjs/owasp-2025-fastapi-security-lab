services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: web_secure
      POSTGRES_USER: web_secure
      POSTGRES_PASSWORD: web_secure
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web_secure -d web_secure"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
