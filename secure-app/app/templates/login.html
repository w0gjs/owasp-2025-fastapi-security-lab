{% extends "base.html" %}
{% block title %}로그인 · 모아{% endblock %}
{% block content %}
<div class="auth-layout">
    <section class="auth-copy">
        <span class="eyebrow">WELCOME BACK</span>
        <h1>다시 만나서<br>반가워요.</h1>
        <p>로그인하고 새로운 이야기와 이웃들의 소식을 확인해보세요.</p>
    </section>
    <section class="panel auth-card">
        <h2>로그인</h2>
        <p class="muted">계정 정보를 입력해주세요.</p>
        {% if error %}<p class="error-box">{{ error }}</p>{% endif %}
        <form method="post" action="/login">
            <div class="field"><label for="username">아이디</label><input id="username" type="text" name="username" placeholder="아이디" required></div>
            <div class="field"><label for="password">비밀번호</label><input id="password" type="password" name="password" placeholder="비밀번호" required></div>
            <button class="button button-full" type="submit">로그인</button>
        </form>
        <p class="auth-foot">처음 오셨나요? <a href="/register">회원가입</a></p>
    </section>
</div>
{% endblock %}
