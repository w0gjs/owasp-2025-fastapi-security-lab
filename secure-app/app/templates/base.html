<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}모아 커뮤니티{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=20260706-2">
</head>
<body>
    <header class="site-header">
        <div class="nav-wrap">
            <a class="brand" href="/posts">
                <span class="brand-mark">M</span>
                <span>모아</span>
            </a>
            <nav class="main-nav" aria-label="주요 메뉴">
                <a href="/posts">커뮤니티</a>
                <a href="/upload">자료실</a>
                {% if user %}
                <a href="/posts/mine">내 게시글</a>
                <a href="/points">포인트</a>
                <a href="/posts/backup">백업</a>
                {% endif %}
            </nav>
            <div class="account-nav">
                {% if user %}
                    {% if user.role == "admin" %}<a class="text-link" href="/admin">관리</a>{% endif %}
                    <span class="user-chip"><span class="avatar">{{ user.nickname[0] }}</span>{{ user.nickname }}</span>
                    <a class="text-link" href="/logout">로그아웃</a>
                {% else %}
                    <a class="text-link" href="/login">로그인</a>
                    <a class="button button-small" href="/register">가입하기</a>
                {% endif %}
            </div>
        </div>
    </header>
    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
        <p>모아 커뮤니티 · 서로의 일상과 생각을 나누는 공간</p>
    </footer>
</body>
</html>
