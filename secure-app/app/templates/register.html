{% extends "base.html" %}
{% block title %}회원가입 · 모아{% endblock %}
{% block content %}
<div class="auth-layout">
    <section class="auth-copy">
        <span class="eyebrow">JOIN MOA</span>
        <h1>우리의 이야기가<br>모이는 곳.</h1>
        <p>간단한 가입 후 커뮤니티의 다양한 이야기에 참여할 수 있습니다.</p>
    </section>
    <section class="panel auth-card">
        <h2>회원가입</h2>
        <p class="muted">모아에서 사용할 정보를 입력해주세요.</p>
        <form method="post" action="/register">
            <div class="field"><label for="username">아이디</label><input id="username" type="text" name="username" placeholder="아이디" required></div>
            <div class="field"><label for="nickname">닉네임</label><input id="nickname" type="text" name="nickname" placeholder="커뮤니티에 표시될 이름" required></div>
            <div class="field"><label for="password">비밀번호</label><input id="password" type="password" name="password" placeholder="비밀번호" required></div>
            <button class="button button-full" type="submit">가입하기</button>
        </form>
        <p class="auth-foot">이미 계정이 있나요? <a href="/login">로그인</a></p>
    </section>
</div>
{% endblock %}
